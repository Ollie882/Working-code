<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="static/app.js" defer></script>
</head>
<body class="auth-page">

    <div class="authwrapper-vertical">
        <div class="auth-banner-top">
            <h2>Welcome back!</h2>
        </div>

        <section class="auth-box">
            <h2>Log In</h2>

            <form id="loginForm">
                <div class="form-group">
                    <label for="UserEmail">Please enter your email</label>
                    <input id="UserEmail" name="UserEmail" type="email" required>
                    <div id="UserEmailError" class="error"></div>
                </div>

                <div class="form-group">
                    <label for="password">Please enter your password</label>
                    <input id="password" name="password" type="password" required>
                    <div id="UserPasswordError" class="error"></div>
                </div>

                <button type="submit">Login</button>
            </form>

            <p>Don't have an account? <a href="signup.html">Sign up here</a></p>
        </section>
    </div>

</body>
</html>
